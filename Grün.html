<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ungewöhnliche Ausrüstung</title>
  <link rel="stylesheet" href="Design Grün_1.css">
</head>
<body>
<header>
  <div class="header-left">
    <h1>Ungewöhnliche Ausrüstung</h1>
    <nav>
      <a href="index.html">Hauptseite</a>
    </nav>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
</header>

  <main>
    <p>Dies ist der Hauptinhalt Ihrer Website.</p>
    <img src="bild.jpg" alt="Beschreibung des Bildes">
  </main>

  <footer>
    <p>&copy; 2026 Mein Name</p>
  </footer>

  <script>
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      const newTheme = currentTheme === "dark" ? "light" : "dark";
      
      document.documentElement.setAttribute("data-theme", newTheme);
      
      const button = document.querySelector('.theme-toggle');
      button.textContent = newTheme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
      
      localStorage.setItem("theme", newTheme);
    }

    const savedTheme = localStorage.getItem("theme") || 
                      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", savedTheme);
    
    const button = document.querySelector('.theme-toggle');
    button.textContent = savedTheme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
  </script>
</body>
</html>
